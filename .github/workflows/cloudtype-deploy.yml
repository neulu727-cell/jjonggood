name: Deploy to Cloudtype

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: neulu727/jjonggood
          stage: main
          yaml: |
            name: jjonggood
            app: python@3.12
            options:
              ports: 8000
              install: pip install flask gunicorn gevent psycopg2-binary python-dotenv
              start: gunicorn 'web.app:create_app()' --bind 0.0.0.0:8000 --worker-class gevent --workers 2 --timeout 30
              git:
                url: https://github.com/${{ github.repository }}.git
                ref: ${{ github.ref }}
              env:
                - name: DATABASE_URL
                  value: ${{ secrets.CT_DATABASE_URL }}
                - name: SECRET_KEY
                  value: ${{ secrets.CT_SECRET_KEY }}
                - name: VIEWER_PASSWORD
                  value: ${{ secrets.CT_VIEWER_PASSWORD }}
                - name: TASKER_API_KEY
                  value: ${{ secrets.CT_TASKER_API_KEY }}
                - name: TZ
                  value: Asia/Seoul
