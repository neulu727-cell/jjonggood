services:
  - type: web
    name: jjonggood
    runtime: python
    buildCommand: pip install -r web/requirements.txt
    startCommand: gunicorn 'web.app:create_app()' --bind 0.0.0.0:$PORT --worker-class gevent --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: VIEWER_PASSWORD
        sync: false
      - key: TASKER_API_KEY
        sync: false
      - key: TZ
        value: Asia/Seoul
      - key: PYTHON_VERSION
        value: "3.11"
