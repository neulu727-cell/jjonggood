<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="쫑굿">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<title>로그인 - 쫑굿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    letter-spacing: -0.02em;
    -webkit-font-smoothing: antialiased;
    background: #F7F8FA;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
}
.login-box {
    background: #fff; border-radius: 16px; padding: 40px 28px;
    width: 90%; max-width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
}
.login-box h1 { font-size: 22px; margin-bottom: 8px; color: #333; }
.login-box .subtitle { font-size: 13px; color: #999; margin-bottom: 28px; }
.login-box input[type="password"] {
    width: 100%; padding: 14px 16px; border: 1.5px solid #ddd;
    border-radius: 10px; font-size: 16px; text-align: center;
    outline: none; margin-bottom: 12px;
}
.login-box input[type="password"]:focus { border-color: #4F46E5; }
.login-illustration {
    margin-bottom: 16px; font-size: 64px; line-height: 1;
}
.remember-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 16px; font-size: 13px; color: #666;
}
.remember-row input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: #4F46E5;
}
.login-box button {
    width: 100%; padding: 14px; background: #4F46E5; color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
}
.login-box button:hover { background: #4338CA; }
.login-box button:active { background: #3730A3; }
.error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<form class="login-box" method="POST" action="/login">
    <div class="login-illustration" aria-hidden="true">🐾</div>
    <h1>&#128062; 쫑굿</h1>
    <p class="subtitle">비밀번호를 입력하세요</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="password" name="password"
           placeholder="비밀번호" autofocus autocomplete="current-password">
    <label class="remember-row">
        <input type="checkbox" name="remember" value="1">
        이 기기 기억하기 (360일)
    </label>
    <button type="submit">확인</button>
</form>
</body>
</html>
