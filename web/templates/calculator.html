<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#4F46E5">
<meta property="og:title" content="우리 아이 미용비 얼마일까?">
<meta property="og:description" content="견종과 몸무게만 선택하면 바로 확인!">
<meta property="og:type" content="website">
<meta name="description" content="견종과 몸무게만 선택하면 바로 확인!">
<title>우리 아이 미용비 얼마일까?</title>
<link rel="stylesheet" href="{{ static_url('calculator.css') }}">
</head>
<body>
<div class="calc-app">
    <!-- 헤더 -->
    <div class="calc-header">
        <h1>우리 아이 미용비 얼마일까?</h1>
        <p>견종과 몸무게만 선택하면 바로 확인!</p>
    </div>

    <!-- 카드1: 반려견 정보 -->
    <div class="calc-card">
        <h2 class="card-title">반려견 정보</h2>
        <div class="form-group">
            <label>견종</label>
            <div class="breed-btn-group">
                <button class="breed-btn active" data-breed="일반" onclick="Calc.selectBreedType('일반')">일반</button>
                <button class="breed-btn" data-breed="비숑" onclick="Calc.selectBreedType('비숑')">비숑</button>
            </div>
            <input type="hidden" id="breedInput" value="일반">
        </div>
        <div class="form-group">
            <label>몸무게</label>
            <div class="weight-btn-group">
                <button class="weight-btn" data-weight="0-4" onclick="Calc.selectWeight('0-4')">~4kg</button>
                <button class="weight-btn" data-weight="4-6" onclick="Calc.selectWeight('4-6')">4~6kg</button>
                <button class="weight-btn" data-weight="6-8" onclick="Calc.selectWeight('6-8')">6~8kg</button>
                <button class="weight-btn" data-weight="8-10" onclick="Calc.selectWeight('8-10')">8~10kg</button>
            </div>
        </div>
    </div>

    <!-- 카드2: 미용 종류 -->
    <div class="calc-card">
        <h2 class="card-title">미용 종류</h2>
        <div class="service-tabs">
            <button class="service-tab active" data-service="위생목욕" onclick="Calc.selectService('위생목욕')">위생+목욕</button>
            <button class="service-tab" data-service="클리핑" onclick="Calc.selectService('클리핑')">클리핑</button>
            <button class="service-tab" data-service="스포팅" onclick="Calc.selectService('스포팅')">스포팅</button>
        </div>

        <!-- 클리핑 선택 시: 얼굴컷/비숑컷 토글 -->
        <div class="clipping-sub-options" id="clippingSubOptions" style="display:none">
            <div class="option-row">
                <div class="option-label">
                    <span id="faceCutLabel">얼굴컷</span>
                    <span class="option-hint" id="faceCutHint"></span>
                </div>
                <div class="toggle-group" id="faceCutToggle">
                    <button class="toggle-btn active" data-val="false" onclick="Calc.setFaceCut(false)">X</button>
                    <button class="toggle-btn" data-val="true" onclick="Calc.setFaceCut(true)">O</button>
                </div>
            </div>
            <div class="bichon-clipping-notice" id="bichonClippingNotice" style="display:none">
                밀어주는 클리핑은 견종 관계없이 동일 요금이에요
            </div>
        </div>

        <!-- 클리핑 길이 (클리핑 선택 시) -->
        <div class="clipping-options" id="clippingOptions" style="display:none">
            <label>클리핑 길이</label>
            <div class="chip-group">
                <button class="chip active" data-length="3mm" onclick="Calc.selectClipping('3mm')">3mm <span class="chip-extra chip-free">+0원</span></button>
                <button class="chip" data-length="6mm" onclick="Calc.selectClipping('6mm')">6mm <span class="chip-extra chip-free">+0원</span></button>
                <button class="chip" data-length="9mm" onclick="Calc.selectClipping('9mm')">9mm <span class="chip-extra chip-free">+0원</span></button>
                <button class="chip" data-length="13mm" onclick="Calc.selectClipping('13mm')">13mm <span class="chip-extra">+1만</span></button>
                <button class="chip" data-length="20mm" onclick="Calc.selectClipping('20mm')">20mm <span class="chip-extra">+2만</span></button>
            </div>
        </div>

        <!-- 포함 서비스 칩 -->
        <div class="included-chips">
            <div class="included-chip" id="chipHygiene">
                <span class="included-check">✓</span>
                <span class="included-text">전체위생 포함</span>
                <span class="included-price">+0원</span>
                <div class="included-tooltip" id="hygieneTooltip">발톱·항문낭·발바닥·배·눈가·입가·귀청소</div>
            </div>
            <div class="included-chip">
                <span class="included-check">✓</span>
                <span class="included-text">입질 추가비 없음</span>
                <span class="included-price">+0원</span>
            </div>
        </div>
    </div>

    <!-- 가격 표시 카드 -->
    <div class="calc-card price-card">
        <div class="price-label">예상 미용 금액</div>
        <div class="price-amount" id="priceAmount">0원</div>
        <div class="price-detail" id="priceDetail"></div>
        <div class="price-notice">엉킴·보정·진드기 등은 상담 후 추가될 수 있습니다</div>
    </div>

    <!-- 상담 연결 카드 -->
    <div class="calc-card">
        <h2 class="card-title">이 견적으로 상담하기</h2>
        <p class="card-desc">버튼을 누르면 견적 내용이 샵에 전달되고, 바로 상담으로 연결됩니다</p>
        <div class="consult-buttons">
            <button class="consult-btn kakao" onclick="Calc.consultVia('kakao')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.58 2 10.9c0 2.78 1.86 5.22 4.65 6.6-.15.53-.96 3.4-.99 3.62 0 0-.02.17.09.23.11.07.24.01.24.01.32-.04 3.7-2.44 4.28-2.86.56.08 1.14.12 1.73.12 5.52 0 10-3.58 10-7.9S17.52 3 12 3z"/></svg>
                <span>카톡 상담</span>
            </button>
            <button class="consult-btn naver" onclick="Calc.consultVia('naver')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.27 10.7L7.4 21h4.47l5.53-6.4V21H21V3h-3.6v7.7zM3 3v18h3.6V13.3L15.47 3H11L5.47 9.4V3H3z"/></svg>
                <span>네이버톡톡</span>
            </button>
            <button class="consult-btn phone" onclick="Calc.consultVia('phone')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                <span>전화 상담</span>
            </button>
        </div>
    </div>

    <div class="calc-footer">
        <p>쫑굿 애견미용</p>
    </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast" style="display:none"></div>

<script>
const BREEDS = {{ breeds | tojson }};
const PRICE_TABLE = {{ price_table_json | tojson }};
const SURCHARGES = {{ surcharges | tojson }};
const SHOP = {
    phone: "{{ shop_phone }}",
    kakao: "{{ shop_kakao_url }}",
    naver: "{{ shop_naver_url }}",
};
</script>
<script src="{{ static_url('calculator.js') }}"></script>
</body>
</html>
