<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-title" content="쫑굿">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<title>예약관리</title>
<link rel="stylesheet" href="{{ static_url('style.css') }}">
</head>
<body>
<div id="app">
    <!-- PC 헤더 -->
    <div class="pc-header pc-only">
        <span class="pc-title">&#128062; 예약관리</span>
        <div style="display:flex;align-items:center;gap:8px">
            <span id="googleStatus" style="font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;background:#374151;color:#9CA3AF;cursor:pointer" onclick="App.toggleGoogle()" title="Google 연락처 연동">&#9679; Google</span>
            <span id="bridgeStatus" style="font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;background:#374151;color:#9CA3AF;cursor:pointer" onclick="window.open('/setup','_blank')" title="클릭하여 설치 페이지 열기">&#9679; ADB</span>
            <span class="pc-clock" id="pcClock"></span>
        </div>
    </div>

    <!-- 북킹/이동 모드 상태바 -->
    <div class="mode-bar" id="modeBar" style="display:none">
        <span id="modeBarText"></span>
        <button id="modeBarCancel" onclick="App.cancelMode()">취소</button>
    </div>

    <div class="main-content">
    <div class="left-panel">

    <!-- 헤더 -->
    <div class="header">
        <button class="btn-today" onclick="App.goToday()">오늘</button>
        <div class="month-nav">
            <button onclick="App.changeMonth(-1)" aria-label="이전 달">&#8249;</button>
            <span class="month-label" id="monthLabel"></span>
            <button onclick="App.changeMonth(1)" aria-label="다음 달">&#8250;</button>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="App.showImportForm()" title="데이터 임포트" aria-label="데이터 임포트">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button class="btn-icon" onclick="App.downloadBackup()" title="백업" aria-label="데이터 백업">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button class="btn-icon mobile-only" id="btnCallHistory" onclick="App.toggleCallHistory()" title="전화이력" aria-label="전화이력">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
                <span class="call-badge" id="callBadge" style="display:none" aria-live="polite">0</span>
            </button>
            <a href="/logout" class="btn-icon" title="로그아웃" aria-label="로그아웃">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </div>

    <!-- 캘린더 -->
    <div class="calendar-section" id="calendarSection">
        <div class="weekday-row">
            <span>일</span><span>월</span><span>화</span><span>수</span>
            <span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    </div><!-- /.left-panel -->

    <!-- 수신기록 + 액션 (중간 컬럼, PC) -->
    <div class="call-sidebar pc-only" id="callSidebar">
        <!-- 통계 바 -->
        <div class="stats-bar" id="statsBar">
            <span class="stats-date" id="statsDate"></span>
            <span class="stats-info" id="statsInfo"></span>
        </div>
        <!-- 수신기록 헤더 -->
        <div class="call-sidebar-header">
            <button onclick="App.changeCallDate(-1)">&#8249;</button>
            <span class="call-sidebar-date" id="callSidebarDate">오늘</span>
            <button onclick="App.changeCallDate(1)">&#8250;</button>
        </div>
        <div class="call-sidebar-list" id="callSidebarList">
            <div class="empty-timeline" style="padding:30px 10px"><img src="{{ static_url('img/peep-nocall.png') }}" alt="" aria-hidden="true" style="height:80px;width:auto;opacity:.7;margin-bottom:4px"><p style="font-size:13px">수신 이력이 없어요</p></div>
        </div>
        <!-- 액션 버튼 -->
        <div class="action-buttons">
            <button class="action-btn blue" onclick="App.showView('customers')">고객 검색</button>
            <button class="action-btn green" onclick="App.onQuickReserve()">예약 등록</button>
            <button class="action-btn purple" onclick="App.showNewCustomerForm()">고객 등록</button>
            <button class="action-btn gray" onclick="App.refresh()">새로고침</button>
            <button class="action-btn gray" onclick="App.showView('sales')">매출관리</button>
        </div>
    </div>

    <!-- 타임라인 -->
    <div class="timeline-section" id="timelineSection">
        <div id="timelineContent">
            <div class="empty-timeline">
                <img src="{{ static_url('img/peep-empty.png') }}" alt="" aria-hidden="true" style="height:120px;width:auto;opacity:.8;margin-bottom:8px">
                <p class="empty-title">날짜를 선택해주세요</p>
                <p>캘린더에서 날짜를 탭하면 예약 현황을 볼 수 있어요</p>
            </div>
        </div>
    </div>

    <!-- 매출관리 뷰 -->
    <div class="sales-view" id="salesView" style="display:none">
        <div class="sales-header">
            <button class="btn-today" onclick="App.goTodaySales()">이번달</button>
            <div class="month-nav">
                <button onclick="App.changeSalesMonth(-1)" aria-label="이전 달">&#8249;</button>
                <span class="month-label" id="salesMonthLabel"></span>
                <button onclick="App.changeSalesMonth(1)" aria-label="다음 달">&#8250;</button>
            </div>
            <button class="btn-icon" onclick="App.showView('calendar')" title="닫기" style="margin-left:auto">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="sales-body" id="salesBody">
            <div class="loading" style="padding:20px"></div>
        </div>
    </div>

    </div><!-- /.main-content -->

    <!-- 하단 네비 (모바일) -->
    <div class="bottom-nav mobile-only">
        <button class="nav-item active" onclick="App.showView('calendar')" data-view="calendar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>캘린더</span>
        </button>
        <button class="nav-item" onclick="App.showView('customers')" data-view="customers">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span>고객</span>
        </button>
        <button class="nav-item" onclick="App.showView('sales')" data-view="sales">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>매출</span>
        </button>
    </div>
</div>

<!-- ===== 모달/바텀시트 컨테이너 ===== -->

<!-- 예약 생성 바텀시트 -->
<div class="bottom-sheet-overlay" id="reservationSheet" style="display:none">
    <div class="bottom-sheet wide-sheet">
        <div class="sheet-handle" onclick="App.closeSheet('reservationSheet')"></div>
        <div class="sheet-header">
            <h3 id="sheetTitle">예약 등록</h3>
            <button class="sheet-close" onclick="App.closeSheet('reservationSheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body" id="reservationForm">
        </div>
    </div>
</div>

<!-- 통합 상세 시트 (예약+고객) -->
<div class="bottom-sheet-overlay" id="unifiedDetailSheet" style="display:none;z-index:110">
    <div class="bottom-sheet wide-sheet">
        <div class="sheet-handle" onclick="App.closeSheet('unifiedDetailSheet')"></div>
        <div class="sheet-header">
            <h3 id="unifiedDetailTitle">상세</h3>
            <button class="sheet-close" onclick="App.closeSheet('unifiedDetailSheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body" id="unifiedDetailContent">
        </div>
    </div>
</div>

<!-- 고객 검색 뷰 -->
<div class="view-panel" id="customerView" style="display:none">
    <div class="panel-header">
        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="customerSearchInput" placeholder="이름, 전화번호, 반려동물 이름" oninput="App.searchCustomers(this.value)">
        </div>
        <button class="btn-primary-sm" onclick="App.showNewCustomerForm()">+ 신규</button>
        <button class="btn-icon" onclick="App.showView('calendar')" title="닫기" style="margin-left:4px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="customer-sort-bar" id="customerSortBar">
        <button class="sort-btn active" data-sort="name" onclick="App.setCustomerSort('name')">가나다순</button>
        <button class="sort-btn" data-sort="recent" onclick="App.setCustomerSort('recent')">최근고객순</button>
    </div>
    <div id="customerSearchResults" class="customer-list"></div>
</div>

<!-- 고객 등록/수정 바텀시트 -->
<div class="bottom-sheet-overlay" id="customerFormSheet" style="display:none">
    <div class="bottom-sheet tall">
        <div class="sheet-handle" onclick="App.closeSheet('customerFormSheet')"></div>
        <div class="sheet-header">
            <h3 id="customerFormTitle">신규 고객 등록</h3>
            <button class="sheet-close" onclick="App.closeSheet('customerFormSheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body" id="customerFormContent">
        </div>
    </div>
</div>


<!-- 전화 알림 팝업 -->
<div class="call-popup" id="callPopup" style="display:none">
    <div class="call-popup-inner">
        <div class="call-popup-close" onclick="App.closeCallPopup()">&times;</div>
        <div id="callPopupContent"></div>
    </div>
</div>

<!-- 전화이력 패널 -->
<div class="bottom-sheet-overlay" id="callHistorySheet" style="display:none">
    <div class="bottom-sheet tall">
        <div class="sheet-handle" onclick="App.closeSheet('callHistorySheet')"></div>
        <div class="sheet-header">
            <h3>전화 이력</h3>
            <button class="sheet-close" onclick="App.closeSheet('callHistorySheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body" id="callHistoryContent"></div>
    </div>
</div>

<!-- 고객 선택 바텀시트 (빈슬롯 탭 후) -->
<div class="bottom-sheet-overlay" id="customerSelectSheet" style="display:none">
    <div class="bottom-sheet tall">
        <div class="sheet-handle" onclick="App.closeSheet('customerSelectSheet')"></div>
        <div class="sheet-header">
            <h3>고객 선택</h3>
            <button class="sheet-close" onclick="App.closeSheet('customerSelectSheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body">
            <div class="search-bar" style="margin-bottom:12px">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="slotCustomerSearch" placeholder="고객 검색..." oninput="App.searchCustomersForSlot(this.value)">
            </div>
            <button class="btn-new-customer-inline" onclick="App.showNewCustomerFormForSlot()">+ 신규 고객 등록 후 예약</button>
            <div id="slotCustomerResults" class="customer-list"></div>
        </div>
    </div>
</div>

<!-- 데이터 임포트 바텀시트 -->
<div class="bottom-sheet-overlay" id="importSheet" style="display:none">
    <div class="bottom-sheet tall">
        <div class="sheet-handle" onclick="App.closeSheet('importSheet')"></div>
        <div class="sheet-header">
            <h3>데이터 임포트</h3>
            <button class="sheet-close" onclick="App.closeSheet('importSheet')" aria-label="닫기">&times;</button>
        </div>
        <div class="sheet-body" id="importFormContent">
            <p style="font-size:13px;color:#999;margin-bottom:12px">
                이전 프로그램 데이터를 텍스트 파일(TSV)로 일괄 등록합니다.<br>
                <strong style="color:#EF4444">기존 데이터가 모두 삭제</strong>된 후 새로 등록됩니다.
            </p>
            <div class="form-group">
                <label>데이터 파일 (.txt)</label>
                <input type="file" id="importFile" accept=".txt,.tsv,.csv">
                <small style="color:#999;font-size:11px;line-height:1.6">
                    탭 구분, 첫 줄 헤더. 같은 전화번호 = 같은 고객.<br>
                    전화번호 &#9; 반려동물 &#9; 견종 &#9; 몸무게 &#9; 나이 &#9; 메모 &#9; 날짜 &#9; 시간 &#9; 소요시간 &#9; 서비스 &#9; 털길이 &#9; 금액 &#9; 결제금액 &#9; 결제방법 &#9; 상태
                </small>
            </div>
            <div id="importResult" style="display:none;margin-bottom:12px;padding:10px;border-radius:8px;font-size:13px"></div>
            <button class="btn-primary" onclick="App.submitImport()" id="importBtn">임포트 실행</button>
        </div>
    </div>
</div>

<!-- 설정 데이터 (서버에서 주입) -->
<script>
const CONFIG = {
    services: {{ services | tojson }},
    furLengths: {{ fur_lengths | tojson }},
    breeds: {{ breeds | tojson }},
    businessStart: "{{ business_start }}",
    businessEnd: "{{ business_end }}",
    slotInterval: {{ slot_interval }},
    taskerKey: "{{ tasker_key }}",
};
</script>
<script src="{{ static_url('app.js') }}"></script>
<script src="{{ static_url('call.js') }}"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js', { scope: '/' });
  });
}
</script>
</body>
</html>
